<script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>

<div style="font-family: Arial, sans-serif; border: 1px solid #ccc; padding: 20px; border-radius: 8px; background-color: #f9f9f9;">
    <h3 id="planet-title" style="color: #003278; text-align: center; margin-bottom: 5px;">Planetary Anchor: Finding the Zero-Drag Groove</h3>
    <p style="text-align: center; font-size: 14px; color: #555; margin-bottom: 20px;">Move the gas giant outward to find the stable resonant orbit.</p>
    
    <div id="planet-plot" style="width: 100%; height: 400px;"></div>
    
    <div style="width: 80%; margin: 0 auto 20px auto; background-color: #e0e0e0; border-radius: 5px; height: 25px; overflow: hidden; border: 1px solid #aaa;">
        <div id="drag-bar" style="width: 80%; height: 100%; background-color: red; transition: width 0.1s, background-color 0.2s;"></div>
    </div>
    <div style="text-align: center; font-weight: bold; margin-bottom: 20px;">Lattice Resistance (Drag): <span id="drag-text">80.0</span>%</div>

    <div style="margin-top: 10px; text-align: center;">
        <label for="distSlider" style="font-weight: bold; font-size: 16px;">Orbital Distance (AU): <span id="distValue" style="color: #003278;">2.00</span></label><br>
        <input type="range" id="distSlider" min="0.5" max="10.0" step="0.05" value="2.00" style="width: 80%; margin-top: 10px;">
    </div>
    
    <div style="text-align: center; margin-top: 15px; font-size: 10px; color: #888;">
        Copyright &copy; 2026 Sovereign KishLattice 16pi Initiative
    </div>
</div>

<script>
    // --- LATTICE CONSTANTS ---
    const PI = Math.PI;
    const KISH_UNIT_AU = 5.20; // Jupiter's anchor

    // Generate distance array (0.5 to 10 AU)
    let distancesAu = [];
    for (let r = 0.5; r <= 10.0; r += 0.05) { distancesAu.push(r); }

    // --- PHYSICS FUNCTION ---
    function calcLatticeDrag(r) {
        let resonanceWave = Math.abs(Math.sin((r / KISH_UNIT_AU) * PI));
        let gravEnvelope = 1.0 / Math.sqrt(r);
        return resonanceWave * gravEnvelope * 100.0;
    }

    let dragLandscape = distancesAu.map(calcLatticeDrag);

    // --- INITIALIZE PLOT ---
    let initDist = 2.0;

    let traceLandscape = {
        x: distancesAu, y: dragLandscape,
        type: 'scatter', mode: 'lines',
        name: 'Vacuum Drag Landscape',
        line: {color: 'black', width: 2, opacity: 0.5},
        hoverinfo: 'none'
    };

    let tracePlanet = {
        x: [initDist], y: [calcLatticeDrag(initDist)],
        type: 'scatter', mode: 'markers',
        name: 'Gas Giant',
        marker: {color: 'red', size: 18, line: {color: 'black', width: 2}}
    };

    let layout = {
        margin: { t: 10, r: 20, b: 40, l: 50 },
        xaxis: { title: 'Orbital Distance (AU)' },
        yaxis: { title: 'Kinematic Lattice Drag (%)', range: [0, 100] },
        showlegend: false,
        paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)',
        shapes: [{
            type: 'line', x0: KISH_UNIT_AU, y0: 0, x1: KISH_UNIT_AU, y1: 100,
            line: {color: 'green', width: 2, dash: 'dash'}
        }],
        annotations: [{
            x: KISH_UNIT_AU + 0.1, y: 80,
            xref: 'x', yref: 'y',
            text: '1 Kish Unit<br>(5.20 AU)',
            showarrow: false, font: {color: 'green', weight: 'bold'}
        }]
    };

    Plotly.newPlot('planet-plot', [traceLandscape, tracePlanet], layout, {responsive: true});
    updateUI(initDist);

    // --- SLIDER INTERACTIVITY ---
    document.getElementById('distSlider').addEventListener('input', function(e) {
        let currentDist = parseFloat(e.target.value);
        document.getElementById('distValue').innerText = currentDist.toFixed(2);
        
        updateUI(currentDist);

        // Animate the planet marker moving along the curve
        Plotly.animate('planet-plot', {
            data: [{ y: dragLandscape }, { x: [currentDist], y: [calcLatticeDrag(currentDist)] }]
        }, {
            transition: { duration: 0 }, frame: { duration: 0, redraw: false }
        });
    });

    function updateUI(dist) {
        let currentDrag = calcLatticeDrag(dist);
        let bar = document.getElementById('drag-bar');
        let text = document.getElementById('drag-text');
        let titleEl = document.getElementById('planet-title');
        
        bar.style.width = currentDrag.toFixed(1) + '%';
        text.innerText = currentDrag.toFixed(1);

        // Phase Lock Check (Drag approaches zero)
        if (currentDrag < 2.0) {
            bar.style.backgroundColor = 'green';
            titleEl.innerText = "RESONANT LOCK ACHIEVED! Anchored at 5.20 AU";
            titleEl.style.color = "green";
            Plotly.restyle('planet-plot', {'marker.color': ['green']}, [1]);
        } else {
            bar.style.backgroundColor = 'red';
            titleEl.innerText = "Planetary Anchor: Finding the Zero-Drag Groove";
            titleEl.style.color = "#003278";
            Plotly.restyle('planet-plot', {'marker.color': ['red']}, [1]);
        }
    }
</script>
