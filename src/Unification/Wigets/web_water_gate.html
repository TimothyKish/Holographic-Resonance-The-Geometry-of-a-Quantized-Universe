<script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>

<div style="font-family: Arial, sans-serif; border: 1px solid #ccc; padding: 20px; border-radius: 8px; background-color: #f9f9f9;">
    <h3 id="water-title" style="color: #003278; text-align: center; margin-bottom: 5px;">The Water Gate: Compressing the Antenna</h3>
    <p style="text-align: center; font-size: 14px; color: #555; margin-bottom: 20px;">Adjust the bond angle to relieve vacuum tension and find the Lattice Lock.</p>
    
    <div id="water-plot" style="width: 100%; height: 400px;"></div>
    
    <div style="width: 80%; margin: 0 auto 20px auto; background-color: #e0e0e0; border-radius: 5px; height: 25px; overflow: hidden; border: 1px solid #aaa;">
        <div id="tension-bar" style="width: 100%; height: 100%; background-color: red; transition: width 0.1s, background-color 0.2s;"></div>
    </div>
    <div style="text-align: center; font-weight: bold; margin-bottom: 20px;">Lattice Geometric Tension: <span id="tension-text">100.0</span>%</div>

    <div style="margin-top: 10px; text-align: center;">
        <label for="angleSlider" style="font-weight: bold; font-size: 16px;">H-O-H Bond Angle: <span id="angleValue" style="color: #cc0000;">109.50°</span></label><br>
        <input type="range" id="angleSlider" min="90.0" max="120.0" step="0.05" value="109.5" style="width: 80%; margin-top: 10px;">
    </div>
    
    <div style="text-align: center; margin-top: 15px; font-size: 10px; color: #888;">
        Copyright &copy; 2026 Sovereign KishLattice 16pi Initiative
    </div>
</div>

<script>
    // --- CHEMICAL & LATTICE CONSTANTS ---
    const TETRAHEDRAL_ANGLE = 109.5;
    const RESONANT_ANGLE = 104.45;

    // Generate angle array (90 to 120 degrees)
    let anglesDeg = [];
    for (let a = 90.0; a <= 120.0; a += 0.2) { anglesDeg.push(a); }

    // --- PHYSICS FUNCTION ---
    function calcLatticeTension(angle) {
        let deviation = Math.abs(angle - RESONANT_ANGLE);
        let tension = Math.pow(deviation, 2) * 4.0;
        return Math.min(tension, 100.0); // Cap at 100%
    }

    let tensionLandscape = anglesDeg.map(calcLatticeTension);

    // --- INITIALIZE PLOT ---
    let initAngle = TETRAHEDRAL_ANGLE;

    let traceLandscape = {
        x: anglesDeg, y: tensionLandscape,
        type: 'scatter', mode: 'lines',
        name: 'Vacuum Tension Landscape',
        line: {color: 'black', width: 2, opacity: 0.5},
        hoverinfo: 'none'
    };

    let traceMolecule = {
        x: [initAngle], y: [calcLatticeTension(initAngle)],
        type: 'scatter', mode: 'markers',
        name: 'H2O Molecule',
        marker: {color: 'red', size: 18, line: {color: 'black', width: 2}}
    };

    let layout = {
        margin: { t: 10, r: 20, b: 40, l: 50 },
        xaxis: { title: 'H-O-H Bond Angle (Degrees)' },
        yaxis: { title: 'Lattice Geometric Tension (%)', range: [0, 105] },
        showlegend: false,
        paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)',
        shapes: [
            { // Red line for standard uncompressed angle
                type: 'line', x0: TETRAHEDRAL_ANGLE, y0: 0, x1: TETRAHEDRAL_ANGLE, y1: 100,
                line: {color: 'red', width: 2, dash: 'dash', opacity: 0.5}
            },
            { // Green line for the resonant lattice lock
                type: 'line', x0: RESONANT_ANGLE, y0: 0, x1: RESONANT_ANGLE, y1: 100,
                line: {color: 'green', width: 2, dash: 'dash', opacity: 0.5}
            }
        ],
        annotations: [
            {
                x: TETRAHEDRAL_ANGLE + 2.5, y: 80,
                xref: 'x', yref: 'y', text: 'Uncompressed<br>(109.5°)',
                showarrow: false, font: {color: 'red', weight: 'bold'}
            },
            {
                x: RESONANT_ANGLE - 2.5, y: 20,
                xref: 'x', yref: 'y', text: 'Lattice Lock<br>(104.45°)',
                showarrow: false, font: {color: 'green', weight: 'bold'}
            }
        ]
    };

    Plotly.newPlot('water-plot', [traceLandscape, traceMolecule], layout, {responsive: true});
    updateUI(initAngle);

    // --- SLIDER INTERACTIVITY ---
    document.getElementById('angleSlider').addEventListener('input', function(e) {
        let currentAngle = parseFloat(e.target.value);
        let valDisplay = document.getElementById('angleValue');
        valDisplay.innerText = currentAngle.toFixed(2) + "°";
        
        updateUI(currentAngle);

        // Animate the molecule marker
        Plotly.animate('water-plot', {
            data: [{ y: tensionLandscape }, { x: [currentAngle], y: [calcLatticeTension(currentAngle)] }]
        }, {
            transition: { duration: 0 }, frame: { duration: 0, redraw: false }
        });
    });

    function updateUI(angle) {
        let currentTension = calcLatticeTension(angle);
        let bar = document.getElementById('tension-bar');
        let text = document.getElementById('tension-text');
        let titleEl = document.getElementById('water-title');
        let valDisplay = document.getElementById('angleValue');
        
        bar.style.width = currentTension.toFixed(1) + '%';
        text.innerText = currentTension.toFixed(1);

        // Phase Lock Check
        if (currentTension < 2.0) {
            bar.style.backgroundColor = 'green';
            titleEl.innerText = "ANTENNA TUNED! Resonance locked at 104.45°";
            titleEl.style.color = "green";
            valDisplay.style.color = "green";
            Plotly.restyle('water-plot', {'marker.color': ['green']}, [1]);
        } else {
            bar.style.backgroundColor = 'red';
            titleEl.innerText = "The Water Gate: Compressing the Antenna";
            titleEl.style.color = "#003278";
            valDisplay.style.color = "#cc0000";
            Plotly.restyle('water-plot', {'marker.color': ['red']}, [1]);
        }
    }
</script>
