<script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>

<div style="font-family: Arial, sans-serif; border: 1px solid #ccc; padding: 20px; border-radius: 8px; background-color: #f9f9f9;">
    <h3 id="chart-title" style="color: #003278; text-align: center; margin-bottom: 5px;">Gray's Paradox: Marine Locomotion vs. 16/π Water Grain</h3>
    <p style="text-align: center; font-size: 14px; color: #555; margin-bottom: 20px;">Adjust the body length to find the lattice resonance slipstream.</p>
    
    <div id="grays-paradox-plot" style="width: 100%; height: 400px;"></div>
    
    <div style="margin-top: 20px; text-align: center;">
        <label for="lengthSlider" style="font-weight: bold; font-size: 16px;">Body Length: <span id="lengthValue" style="color: #003278;">2.5</span> m</label><br>
        <input type="range" id="lengthSlider" min="1.0" max="12.0" step="0.1" value="2.5" style="width: 80%; margin-top: 10px;">
    </div>
    
    <div style="text-align: center; margin-top: 15px; font-size: 10px; color: #888;">
        Copyright &copy; 2026 Sovereign KishLattice 16pi Initiative
    </div>
</div>

<script>
    // --- LATTICE CONSTANTS ---
    const PI = Math.PI;
    const K_GEO = 16.0 / PI; // 5.092958
    const WATER_DENSITY = 1026;

    // Generate velocity array (1 to 15 m/s)
    let velocities = [];
    for (let i = 1; i <= 15; i += 0.5) {
        velocities.push(i);
    }

    // --- PHYSICS FUNCTIONS ---
    function calculateStandardDrag(length) {
        return velocities.map(v => {
            let area_approx = length * 0.2;
            let drag_coefficient = 0.004;
            return 0.5 * WATER_DENSITY * Math.pow(v, 2) * area_approx * drag_coefficient;
        });
    }

    function calculateLatticeSlipstream(length) {
        let standard_drag = calculateStandardDrag(length);
        // Calculate phase-lock resonance
        let harmonic_resonance = Math.abs(Math.sin((length / K_GEO) * PI));
        let slipstream_multiplier = 0.1 + (0.9 * harmonic_resonance);
        
        return standard_drag.map(drag => drag * slipstream_multiplier);
    }

    // --- INITIALIZE PLOT ---
    let initialLength = 2.5;

    let traceStandard = {
        x: velocities,
        y: calculateStandardDrag(initialLength),
        type: 'scatter',
        mode: 'lines',
        name: 'Old World Drag',
        line: {dash: 'dashdot', color: 'red', width: 2}
    };

    let traceLattice = {
        x: velocities,
        y: calculateLatticeSlipstream(initialLength),
        type: 'scatter',
        mode: 'lines',
        name: 'Lattice Slipstream',
        line: {color: '#003278', width: 3}
    };

    let layout = {
        margin: { t: 20, r: 20, b: 40, l: 50 },
        xaxis: { title: 'Swimming Velocity (m/s)' },
        yaxis: { title: 'Resistance' },
        legend: { x: 0.05, y: 0.95 },
        paper_bgcolor: 'rgba(0,0,0,0)',
        plot_bgcolor: 'rgba(0,0,0,0)'
    };

    Plotly.newPlot('grays-paradox-plot', [traceStandard, traceLattice], layout, {responsive: true});

    // --- SLIDER INTERACTIVITY ---
    document.getElementById('lengthSlider').addEventListener('input', function(e) {
        let currentLength = parseFloat(e.target.value);
        document.getElementById('lengthValue').innerText = currentLength.toFixed(1);
        
        // Check for Phase-Lock (near a multiple of K_GEO)
        let resonanceCheck = Math.abs(Math.sin((currentLength / K_GEO) * PI));
        let titleEl = document.getElementById('chart-title');
        let latticeColor = '#003278';

        if (resonanceCheck < 0.05) {
            titleEl.innerText = "PHASE LOCK ACHIEVED! Resonance with 16/π";
            titleEl.style.color = "green";
            latticeColor = 'green';
        } else {
            titleEl.innerText = "Gray's Paradox: Marine Locomotion vs. 16/π Water Grain";
            titleEl.style.color = "#003278";
        }

        // Update Plotly Data
        Plotly.animate('grays-paradox-plot', {
            data: [
                { y: calculateStandardDrag(currentLength) },
                { y: calculateLatticeSlipstream(currentLength), line: {color: latticeColor, width: 3} }
            ]
        }, {
            transition: { duration: 0 },
            frame: { duration: 0, redraw: false }
        });
    });
</script>
