<script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>

<div style="font-family: Arial, sans-serif; border: 1px solid #ccc; padding: 20px; border-radius: 8px; background-color: #f9f9f9;">
    <h3 id="dm-title" style="color: #003278; text-align: center; margin-bottom: 5px;">Galactic Rotation: Eliminating Dark Matter</h3>
    <p style="text-align: center; font-size: 14px; color: #555; margin-bottom: 20px;">Adjust the Vacuum Viscosity coefficient to match observed reality.</p>
    
    <div id="dm-plot" style="width: 100%; height: 400px;"></div>
    
    <div style="margin-top: 20px; text-align: center;">
        <label for="viscSlider" style="font-weight: bold; font-size: 16px;">Vacuum Viscosity Coefficient: <span id="viscValue" style="color: #003278;">0.00</span></label><br>
        <input type="range" id="viscSlider" min="0.0" max="8.0" step="0.01" value="0.0" style="width: 80%; margin-top: 10px;">
    </div>
    
    <div style="text-align: center; margin-top: 15px; font-size: 10px; color: #888;">
        Copyright &copy; 2026 Sovereign KishLattice 16pi Initiative
    </div>
</div>

<script>
    // --- LATTICE CONSTANTS ---
    const PI = Math.PI;
    const K_GEO = 16.0 / PI; // ~5.09

    // Generate radius array (0.1 to 30 kpc)
    let radiusKpc = [];
    for (let r = 0.1; r <= 30; r += 0.2) { radiusKpc.push(r); }

    // --- PHYSICS FUNCTIONS ---
    function getVisibleMassVel() {
        return radiusKpc.map(r => {
            let v_core = 250.0 * (1 - Math.exp(-r / 2));
            let drop_off = Math.exp(-r / 15);
            return v_core * drop_off;
        });
    }

    function getObservedVel() {
        return radiusKpc.map(r => 230.0 * (1 - Math.exp(-r / 2.5)));
    }

    function getLatticeVel(viscosity) {
        let v_visib = getVisibleMassVel();
        let v_obs = getObservedVel();
        let tension_factor = viscosity / K_GEO;
        
        return radiusKpc.map((r, i) => {
            return v_visib[i] + (v_obs[i] - v_visib[i]) * tension_factor;
        });
    }

    // --- INITIALIZE PLOT ---
    let initVisc = 0.0;

    let traceObserved = {
        x: radiusKpc, y: getObservedVel(),
        type: 'scatter', mode: 'lines',
        name: 'Observed Reality',
        line: {dash: 'dot', color: 'black', width: 3, opacity: 0.6}
    };

    let traceVisible = {
        x: radiusKpc, y: getVisibleMassVel(),
        type: 'scatter', mode: 'lines',
        name: 'Visible Mass Only (Fails)',
        line: {dash: 'dash', color: 'red', width: 2}
    };

    let traceLattice = {
        x: radiusKpc, y: getLatticeVel(initVisc),
        type: 'scatter', mode: 'lines',
        name: 'Kish Lattice Kinematics',
        line: {color: '#003278', width: 3}
    };

    let layout = {
        margin: { t: 10, r: 20, b: 40, l: 50 },
        xaxis: { title: 'Distance from Galactic Center (kpc)' },
        yaxis: { title: 'Orbital Velocity (km/s)', range: [0, 300] },
        legend: { orientation: 'h', y: 1.15, x: 0 },
        paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)'
    };

    Plotly.newPlot('dm-plot', [traceObserved, traceVisible, traceLattice], layout, {responsive: true});

    // --- SLIDER INTERACTIVITY ---
    document.getElementById('viscSlider').addEventListener('input', function(e) {
        let currentVisc = parseFloat(e.target.value);
        document.getElementById('viscValue').innerText = currentVisc.toFixed(2);
        
        let titleEl = document.getElementById('dm-title');
        let latticeColor = '#003278';

        // Phase Lock Check
        if (Math.abs(currentVisc - K_GEO) < 0.05) {
            titleEl.innerText = "DARK MATTER ELIMINATED! Viscosity = 16/π";
            titleEl.style.color = "green";
            latticeColor = 'green';
        } else {
            titleEl.innerText = "Galactic Rotation: Eliminating Dark Matter";
            titleEl.style.color = "#003278";
        }

        // Update Plotly Data
        Plotly.animate('dm-plot', {
            data: [
                { y: getObservedVel() }, 
                { y: getVisibleMassVel() }, 
                { y: getLatticeVel(currentVisc), line: {color: latticeColor, width: 3} }
            ]
        }, {
            transition: { duration: 0 }, frame: { duration: 0, redraw: false }
        });
    });
</script>
