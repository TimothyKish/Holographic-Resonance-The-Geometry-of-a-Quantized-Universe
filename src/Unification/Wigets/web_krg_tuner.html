<script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>

<div style="font-family: Arial, sans-serif; border: 1px solid #ccc; padding: 20px; border-radius: 8px; background-color: #f9f9f9;">
    <h3 id="krg-title" style="color: #003278; text-align: center; margin-bottom: 5px;">KRG Tuner: Align with Stratum 0 Prime Clock</h3>
    <p style="text-align: center; font-size: 14px; color: #555; margin-bottom: 20px;">Sweeping frequency is not enough. You must achieve Phase-Lock.</p>
    
    <div id="krg-plot" style="width: 100%; height: 350px;"></div>
    
    <div style="width: 80%; margin: 0 auto 20px auto; background-color: #e0e0e0; border-radius: 5px; height: 25px; overflow: hidden; border: 1px solid #aaa;">
        <div id="coupling-bar" style="width: 0%; height: 100%; background-color: red; transition: width 0.2s, background-color 0.2s;"></div>
    </div>
    <div style="text-align: center; font-weight: bold; margin-bottom: 20px;">Lattice Coupling: <span id="coupling-text">0.0</span>%</div>

    <div style="margin-top: 10px; text-align: center;">
        <label for="rpmSlider" style="font-weight: bold; font-size: 14px;">Rotor Frequency (RPM): <span id="rpmValue" style="color: #003278;">280.0</span></label><br>
        <input type="range" id="rpmSlider" min="280.0" max="330.0" step="0.1" value="280.0" style="width: 80%; margin-top: 5px; margin-bottom: 15px;">
        
        <br>
        
        <label for="phaseSlider" style="font-weight: bold; font-size: 14px;">Phase Offset (Degrees): <span id="phaseValue" style="color: #003278;">90</span>°</label><br>
        <input type="range" id="phaseSlider" min="-180" max="180" step="1" value="90" style="width: 80%; margin-top: 5px;">
    </div>
    
    <div style="text-align: center; margin-top: 20px; font-size: 10px; color: #888;">
        Copyright &copy; 2026 Sovereign KishLattice 16pi Initiative
    </div>
</div>

<script>
    // --- LATTICE CONSTANTS ---
    const PI = Math.PI;
    const K_GEO_HZ = 16.0 / PI; 
    const TARGET_RPM = K_GEO_HZ * 60.0; // 305.577

    // Generate time array (0 to 1 second)
    let time = [];
    for (let i = 0; i <= 1; i += 0.005) { time.push(i); }

    // --- PHYSICS FUNCTIONS ---
    function getPrimeWave() {
        return time.map(t => Math.sin(2 * PI * K_GEO_HZ * t));
    }

    function getKrgWave(rpm, phaseDeg) {
        let freqHz = rpm / 60.0;
        let phaseRad = phaseDeg * (PI / 180.0);
        return time.map(t => Math.sin(2 * PI * freqHz * t + phaseRad));
    }

    function calcCoupling(rpm, phaseDeg) {
        let freqDiff = Math.abs(rpm - TARGET_RPM);
        let freqFactor = Math.exp(-Math.pow(freqDiff, 2) / 5.0);
        
        let phaseRad = phaseDeg * (PI / 180.0);
        let phaseFactor = (Math.cos(phaseRad) + 1) / 2.0;
        
        return freqFactor * phaseFactor * 100.0;
    }

    // --- INITIALIZE PLOT ---
    let initRpm = 280.0;
    let initPhase = 90;

    let tracePrime = {
        x: time, y: getPrimeWave(),
        type: 'scatter', mode: 'lines',
        name: '2 Zeta Prime Clock',
        line: {dash: 'dot', color: 'black', width: 2}
    };

    let traceKrg = {
        x: time, y: getKrgWave(initRpm, initPhase),
        type: 'scatter', mode: 'lines',
        name: 'KRG Rotor',
        line: {color: 'red', width: 3}
    };

    let layout = {
        margin: { t: 10, r: 20, b: 40, l: 40 },
        xaxis: { title: 'Time (s)' },
        yaxis: { range: [-1.5, 1.5], showticklabels: false },
        legend: { orientation: 'h', y: 1.1 },
        paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)'
    };

    Plotly.newPlot('krg-plot', [tracePrime, traceKrg], layout, {responsive: true});
    updateUI(initRpm, initPhase);

    // --- SLIDER INTERACTIVITY ---
    function onSliderChange() {
        let rpm = parseFloat(document.getElementById('rpmSlider').value);
        let phase = parseFloat(document.getElementById('phaseSlider').value);
        
        document.getElementById('rpmValue').innerText = rpm.toFixed(1);
        document.getElementById('phaseValue').innerText = phase;
        
        updateUI(rpm, phase);

        Plotly.animate('krg-plot', {
            data: [{ y: getPrimeWave() }, { y: getKrgWave(rpm, phase) }]
        }, {
            transition: { duration: 0 }, frame: { duration: 0, redraw: false }
        });
    }

    function updateUI(rpm, phase) {
        let coupling = calcCoupling(rpm, phase);
        let bar = document.getElementById('coupling-bar');
        let text = document.getElementById('coupling-text');
        let title = document.getElementById('krg-title');
        
        bar.style.width = coupling.toFixed(1) + '%';
        text.innerText = coupling.toFixed(1);

        if (coupling > 95.0) {
            bar.style.backgroundColor = 'green';
            title.innerText = "STRATUM 0 PHASE-LOCK ACHIEVED!";
            title.style.color = "green";
        } else if (coupling > 50.0) {
            bar.style.backgroundColor = 'orange';
            title.innerText = "Partial Harmonic Overlap - Adjust Phase";
            title.style.color = "orange";
        } else {
            bar.style.backgroundColor = 'red';
            title.innerText = "KRG Tuner: Align with Stratum 0 Prime Clock";
            title.style.color = "#003278";
        }
    }

    document.getElementById('rpmSlider').addEventListener('input', onSliderChange);
    document.getElementById('phaseSlider').addEventListener('input', onSliderChange);
</script>
